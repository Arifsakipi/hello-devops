name: CI

# When should this pipeline run?
on:
  push:
    branches: [ main ]        # every push to main
  pull_request:
    branches: [ main ]        # and every PR targeting main

jobs:
  build:
    runs-on: ubuntu-latest    # GitHub spins up a fresh Linux VM for us

    steps:
      - name: Check out the code
        uses: actions/checkout@v4          # pull your repo onto the runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"           # match your Dockerfile's Python

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py

      - name: Build the Docker image
        run: docker build -t hello-devops .
